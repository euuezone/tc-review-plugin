<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  font-size: 13px; color: #1A202C; background: #fff; padding: 16px; }
h2 { font-size: 14px; font-weight: 700; color: #1E3A5F; margin-bottom: 6px; }
.hint { font-size: 11px; color: #718096; margin-bottom: 12px; line-height: 1.7; }
.hint b { color: #1E3A5F; }
.preview { background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 8px;
  padding: 12px; margin-bottom: 12px; }
.preview-title { font-size: 13px; color: #1D4ED8; font-weight: 700; }
.preview-cols  { font-size: 11px; color: #3B82F6; margin-top: 4px; }
textarea { width: 100%; height: 96px; border: 2px dashed #E2E8F0; border-radius: 8px;
  padding: 10px; font-size: 12px; font-family: inherit; resize: none; outline: none; color: #1A202C; }
textarea:focus { border-color: #1E3A5F; border-style: solid; }
.btns { display: flex; gap: 8px; margin-top: 12px; }
button { padding: 8px 16px; border-radius: 7px; border: none; cursor: pointer;
  font-size: 12px; font-weight: 600; font-family: inherit; transition: background .15s; }
.btn-p { background: #1E3A5F; color: #fff; flex: 1; }
.btn-p:hover { background: #2D5282; }
.btn-g { background: #F1F5F9; color: #718096; border: 1px solid #E2E8F0; }
.btn-g:hover { background: #E2E8F0; }
.err { color: #DC2626; font-size: 11px; margin-top: 6px; min-height: 16px; }
.screen { display: none; }
.screen.on { display: block; }
</style>
</head>
<body>

<!-- 붙여넣기 화면 -->
<div id="sPaste" class="screen on">
  <h2>TC 표 붙여넣기</h2>
  <p class="hint">
    TC 검토 플러그인에서 <b>📐 피그마 복사</b> 클릭 후<br>
    아래 칸에 붙여넣기(⌘V / Ctrl+V) 하세요
  </p>
  <textarea id="pasteArea" placeholder="여기에 붙여넣기…"></textarea>
  <p class="err" id="errMsg"></p>
  <div class="btns">
    <button class="btn-p" onclick="parseAndPreview()">확인</button>
    <button class="btn-g" onclick="cancel()">취소</button>
  </div>
</div>

<!-- 미리보기 화면 -->
<div id="sPreview" class="screen">
  <h2>TC 표 붙여넣기</h2>
  <div class="preview">
    <div class="preview-title" id="previewInfo"></div>
    <div class="preview-cols"  id="previewCols"></div>
  </div>
  <div class="btns">
    <button class="btn-p" onclick="createTable()">표 만들기</button>
    <button class="btn-g" onclick="show('sPaste')">다시 붙여넣기</button>
  </div>
</div>

<script>
var _data = null;

function show(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('on'); });
  document.getElementById(id).classList.add('on');
}

function cancel() {
  parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
}

function parseTSV(raw) {
  var rows = [];
  var row = [], cell = '', inQ = false;
  for (var i = 0; i < raw.length; i++) {
    var ch = raw[i];
    if (inQ) {
      if (ch === '"' && raw[i+1] === '"') { cell += '"'; i++; }
      else if (ch === '"') inQ = false;
      else cell += ch;
    } else {
      if      (ch === '"')  inQ = true;
      else if (ch === '\t') { row.push(cell.trim()); cell = ''; }
      else if (ch === '\r' && raw[i+1] === '\n') { row.push(cell.trim()); rows.push(row); row=[]; cell=''; i++; }
      else if (ch === '\n') { row.push(cell.trim()); rows.push(row); row=[]; cell=''; }
      else cell += ch;
    }
  }
  if (cell || row.length) { row.push(cell.trim()); rows.push(row); }
  return rows.filter(function(r) { return r.some(function(c) { return c !== ''; }); });
}

function parseAndPreview() {
  var raw = document.getElementById('pasteArea').value.trim();
  document.getElementById('errMsg').textContent = '';
  if (!raw) { document.getElementById('errMsg').textContent = '데이터를 붙여넣어 주세요.'; return; }
  var rows = parseTSV(raw);
  if (rows.length < 2) { document.getElementById('errMsg').textContent = '헤더 + 데이터 행이 필요합니다.'; return; }
  var headers = rows[0];
  var data = rows.slice(1);
  _data = { headers: headers, rows: data };
  document.getElementById('previewInfo').textContent = headers.length + '열 × ' + data.length + '행 인식됨';
  var preview = headers.slice(0, 6).join(' · ') + (headers.length > 6 ? ' ···' : '');
  document.getElementById('previewCols').textContent = '컬럼: ' + preview;
  show('sPreview');
}

function createTable() {
  if (!_data) return;
  parent.postMessage({ pluginMessage: { type: 'create-table', headers: _data.headers, rows: _data.rows } }, '*');
}
</script>
</body>
</html>
